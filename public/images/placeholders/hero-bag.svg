<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a96e"/>
      <stop offset="100%" style="stop-color:#8b7355"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <!-- Elegant bag silhouette -->
  <g transform="translate(200, 200)" opacity="0.9">
    <!-- Bag body -->
    <rect x="50" y="150" width="300" height="250" rx="20" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <!-- Bag flap -->
    <path d="M50 150 Q200 100 350 150 L350 200 L50 200 Z" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <!-- Bag handle -->
    <ellipse cx="200" cy="100" rx="80" ry="50" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <!-- Clasp -->
    <circle cx="200" cy="175" r="15" fill="none" stroke="url(#gold)" stroke-width="2"/>
  </g>
  <!-- Decorative lines -->
  <line x1="100" y1="600" x2="700" y2="600" stroke="url(#gold)" stroke-width="0.5" opacity="0.5"/>
  <line x1="100" y1="650" x2="700" y2="650" stroke="url(#gold)" stroke-width="0.5" opacity="0.3"/>
  <!-- Brand text -->
  <text x="400" y="700" font-family="Georgia, serif" font-size="24" fill="#c9a96e" text-anchor="middle" letter-spacing="8">NOREVA</text>
  <text x="400" y="750" font-family="Georgia, serif" font-size="14" fill="#666" text-anchor="middle" letter-spacing="4">MAISON</text>
</svg>
